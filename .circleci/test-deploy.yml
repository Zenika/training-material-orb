version: 2.1
orbs:
  training-material: zenika/training-material@dev:<<pipeline.git.revision>>
  orb-tools: circleci/orb-tools@12.4.0

filters: &filters
  tags:
    only: /.*/

workflows:
  test-deploy:
    jobs:
      # Make sure to include "filters: *filters" in every test job you want to run as part of your deployment.
      - orb-tools/pack:
          filters: *filters
      - training-material/lint:
          filters: *filters
          slides-path: /tmp/sensei/example/Slides
          pre-steps:
            - run:
                name: Clone sensei example
                command: git clone --depth 1 https://github.com/Zenika/sensei /tmp/sensei
      - orb-tools/publish:
          orb_name: zenika/training-material
          vcs_type: << pipeline.project.type >>
          pub_type: production
          requires:
            - orb-tools/pack
            - training-material/lint
          context: orb-publishing
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /^v[0-9]+\.[0-9]+\.[0-9]+$/
